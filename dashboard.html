// ---- File Input (singleton) ----
let fileInput = null;
function getFileInput(accept, callback) {
  if (fileInput) fileInput.remove();
  fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = accept;
  fileInput.style.display = 'none';
  fileInput.onchange = () => {
    if (fileInput.files && fileInput.files[0]) {
      callback(fileInput.files[0]);
    }
    fileInput.remove();
    fileInput = null;
  };
  document.body.appendChild(fileInput);
  fileInput.click();
}

// ---- Dashboard Controller ----
const Dashboard = {
  // Add menu toggle
  toggleAddMenu(e) {
    e.stopPropagation();
    const menu = $('#addBlockMenu');
    if (menu.style.display === 'none') {
      menu.style.display = 'block';
      // Setup one-time click-to-close
      const closer = (ev) => {
        if (!menu.contains(ev.target) && ev.target !== $('#addBlockBtn')) {
          menu.style.display = 'none';
          document.removeEventListener('click', closer);
        }
      };
      setTimeout(() => document.addEventListener('click', closer), 0);

      // Handle menu clicks
      menu.onclick = (ev) => {
        const action = ev.target.closest('[data-action]')?.dataset.action;
        if (!action) return;
        menu.style.display = 'none';
        if (action === 'add-text') Dashboard.addBlock('text');
        else if (action === 'add-image') Dashboard.addBlock('image');
        else if (action === 'add-pdf') Dashboard.addBlock('pdf');
        else if (action === 'add-embed') Dashboard.addBlock('embed');
      };
    } else {
      menu.style.display = 'none';
    }
  },

  // Overlap toggle
  toggleOverlap() {
    const db = State.active;
    if (!db) return;
    db.allowOverlap = !db.allowOverlap;
    State.save();
    this.updateOverlapButton();
    // If overlap disabled, re-render to snap positions
    if (!db.allowOverlap) {
      db.blocks.forEach(block => {
        if (!block.collapsed) {
          const pos = findNonOverlappingPosition(block, db.blocks);
          block.x = pos.x;
          block.y = pos.y;
        }
      });
      Render.blocks();
    }
  },

  updateOverlapButton() {
    const db = State.active;
    const btn = $('#overlapToggle');
    if (!btn) return;
    if (db && db.allowOverlap) {
      btn.innerHTML = '<span>⊞ 可重叠</span>';
      btn.className = 'btn btn-secondary';
    } else {
      btn.innerHTML = '<span>⊟ 不重叠</span>';
      btn.className = 'btn btn-secondary';
      btn.style.background = '#fef3c7';
      btn.style.borderColor = '#f59e0b';
      btn.style.color = '#92400e';
    }
    if (!db) {
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }
  },

  // Tab management
  addDashboard(name) {
    State.addDashboard(name);
    Render.all();
  },

  removeDashboard(idx) {
    State.removeDashboard(idx);
  },

  switchDashboard(idx) {
    State.switchTo(idx);
  },

  startRename(idx) {
    closeContextMenu();
    const tab = $(`.tab[data-idx="${idx}"]`, $('#tabBar'));
    if (!tab) return;
    const nameSpan = tab.childNodes[0];
    const currentName = nameSpan ? nameSpan.textContent.trim() : State.dashboards[idx].name;

    const input = document.createElement('input');
    input.type = 'text';
    input.value = currentName;
    input.style.cssText = 'font-size:13px;font-weight:500;border:1px solid var(--accent);border-radius:4px;padding:2px 6px;outline:none;width:120px;font-family:inherit;background:white;';
    tab.innerHTML = '';
    tab.appendChild(input);
    input.focus();
    input.select();

    const finish = () => {
      State.renameDashboard(idx, input.value);
      Render.tabs();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') finish(); if (e.key === 'Escape') { input.value = currentName; finish(); } });
  },

  // Block CRUD
  addBlock(type) {
    const db = State.active;
    if (!db) return;
    const nextZ = Math.max(0, ...db.blocks.map(b => b.z || 0)) + 1;
    const block = {
      id: uid(),
      type: type || 'text',
      title: `方块 ${db.blocks.length + 1}`,
      x: 40 + (db.blocks.length % 4) * 30,
      y: 40 + (db.blocks.length % 4) * 30,
      w: 400,
      h: 320,
      collapsed: false,
      content: '',
      color: '',
      fontFamily: '',
      fontSize: 14,
      z: nextZ,
      locked: false,
      borderRadius: '',
      shadow: '',
      mdMode: false
    };
    db.blocks.push(block);
    UndoRedo.push();
    State.save();
    Render.blocks();
    Render.emptyState();

    if (!type || type === 'text') {
      setTimeout(() => Dashboard.editTextContent(block.id), 100);
    } else if (type === 'image') {
      getFileInput('image/*', (file) => Dashboard.importImage(block.id, file));
    } else if (type === 'pdf') {
      getFileInput('.pdf', (file) => Dashboard.importPDF(block.id, file));
    } else if (type === 'embed') {
      const url = prompt('请输入要嵌入的网页 URL：', 'https://');
      if (url) {
        State.updateBlock(block.id, { type: 'embed', content: url, title: url.replace(/^https?:\/\//, '').split('/')[0] });
        Render.singleBlock(State.active.blocks.find(b => b.id === block.id));
        Toast.show('网页已嵌入');
      }
    }
  },

  removeBlock(blockId) {
    State.removeBlock(blockId);
    UndoRedo.push();
    Dashboard.updateMinimap();
  },

  clearBlocks() {
    const db = State.active;
    if (!db || db.blocks.length === 0) return;
    if (!confirm(`确定要清空「${db.name}」中的所有 ${db.blocks.length} 个方块吗？此操作不可撤销。`)) return;
    db.blocks = [];
    UndoRedo.push();
    State.save();
    Render.blocks();
    Render.emptyState();
    Dashboard.updateMinimap();
    Toast.show('展示板已清空');
  },

  toggleBlock(blockId) {
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block) return;
    block.collapsed = !block.collapsed;
    UndoRedo.push();
    State.save();
    Render.singleBlock(block);
  },

  startDrag(e, blockId) {
    // Don't start drag if clicking action buttons
    if (e.target.closest('.block-btn')) return;
    DragDrop.start(e, blockId);
  },

  startResize(e, blockId, handle) {
    Resize.start(e, blockId, handle);
  },

  // Content import
  importImage(blockId, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      State.updateBlock(blockId, { type: 'image', content: reader.result });
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      Toast.show('图片已导入');
    };
    reader.readAsDataURL(file);
  },

  importPDF(blockId, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      State.updateBlock(blockId, { type: 'pdf', content: reader.result });
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      Toast.show('PDF 已导入');
    };
    reader.readAsDataURL(file);
  },

  editTextContent(blockId) {
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block) return;
    const el = document.getElementById(blockId);
    if (!el) return;
    const body = el.querySelector('.block-body');
    if (!body) return;

    const existingTextarea = body.querySelector('textarea');
    if (existingTextarea) {
      existingTextarea.focus();
      return;
    }

    const currentContent = body.querySelector('.block-text')?.textContent || block.content || '';
    body.innerHTML = `
      <textarea style="width:100%;height:100%;border:none;resize:none;padding:14px;font-size:${block.fontSize || 14}px;line-height:1.7;font-family:${Dashboard._escHTML(block.fontFamily) || 'var(--font)'};outline:none;background:#fafbfc;display:block;"
                placeholder="输入文本内容...">${Dashboard._escHTML(currentContent)}</textarea>`;

    const textarea = body.querySelector('textarea');
    textarea.focus();

    // Auto-save on input with debounce
    let saveTimer;
    textarea.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        State.updateBlock(blockId, { type: 'text', content: textarea.value });
        State.save();
      }, 600);
    });

    // Save on blur
    textarea.addEventListener('blur', () => {
      clearTimeout(saveTimer);
      State.updateBlock(blockId, { type: 'text', content: textarea.value });
      State.save();
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
    });

    // Ctrl+Enter to finish editing
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        textarea.blur();
      }
    });
  },

  _escHTML(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  },

  renameBlock(blockId) {
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block) return;
    const el = document.getElementById(blockId);
    if (!el) return;
    const titleEl = el.querySelector('.block-title');
    if (!titleEl) return;

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'block-title-input';
    input.value = block.title;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    const finish = () => {
      const newTitle = input.value.trim() || block.title;
      State.updateBlock(blockId, { title: newTitle });
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') finish();
      if (e.key === 'Escape') { input.value = block.title; finish(); }
    });
  },

  // Context menu
  showContextMenu(e, blockId) {
    closeContextMenu();
    closeFontPopup();
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block) return;

    // If we're in connect mode, complete the connection
    if (this._connectFrom && this._connectFrom !== blockId) {
      const fromId = this._connectFrom;
      this._connectFrom = null;
      this.addConnection(fromId, blockId);
      return;
    }
    this._connectFrom = null;

    const menu = document.createElement('div');
    menu.className = 'context-menu';
    menu.innerHTML = `
      <button class="context-menu-item" data-action="import-image">🖼️ 导入图片</button>
      <button class="context-menu-item" data-action="import-pdf">📄 导入 PDF</button>
      <button class="context-menu-item" data-action="edit-text">📝 编辑文本</button>
      <button class="context-menu-item" data-action="import-embed">🌐 嵌入网页</button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="copy-block">📋 复制方块</button>
      <button class="context-menu-item" data-action="rename">✏️ 重命名</button>
      <button class="context-menu-item" data-action="toggle">${block.collapsed ? '📖 展开' : '📕 折叠'}</button>
      ${block.type === 'text' ? `<button class="context-menu-item" data-action="toggle-md">${block.mdMode ? '📝 纯文本模式' : '📋 Markdown 模式'}</button>` : ''}
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="block-color">
        🎨 方块颜色 <input type="color" value="${block.color || '#4f6ef7'}" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"/>
      </button>
      <button class="context-menu-item" data-action="block-radius">
        🔲 圆角 <input type="range" min="0" max="30" value="${parseInt(block.borderRadius) || 0}" style="width:60px;margin-left:4px;" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"/>
      </button>
      ${block.type === 'text' ? `
      <button class="context-menu-item" data-action="block-font">
        🔤 字体设置
      </button>` : ''}
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="lock">${block.locked ? '🔓 解锁方块' : '🔒 锁定方块'}</button>
      <button class="context-menu-item" data-action="bring-front">⬆️ 置于顶层</button>
      <button class="context-menu-item" data-action="send-back">⬇️ 置于底层</button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="delete" style="color:var(--danger)">🗑️ 删除方块</button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="connect">🔗 连接到此方块</button>
      <button class="context-menu-item" data-action="add-tag">🏷️ 添加标签</button>
      <button class="context-menu-item" data-action="table-import">📊 导入 CSV 表格</button>
    `;

    // Bind color input change
    const colorInput = menu.querySelector('input[type="color"]');
    if (colorInput) {
      colorInput.addEventListener('input', (ev) => {
        ev.stopPropagation();
        State.updateBlock(blockId, { color: colorInput.value });
        Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      });
    }
    // Bind radius slider
    const radiusSlider = menu.querySelector('input[type="range"]');
    if (radiusSlider) {
      radiusSlider.addEventListener('input', (ev) => {
        ev.stopPropagation();
        const val = parseInt(radiusSlider.value);
        State.updateBlock(blockId, { borderRadius: val ? val + 'px' : '' });
        Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      });
    }

    // Append before measuring for accurate viewport bounds
    document.body.appendChild(menu);
    const rect = menu.getBoundingClientRect();

    // Position and keep within viewport
    let x = e.clientX;
    let y = e.clientY;
    if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 8;
    if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 8;
    if (x < 4) x = 4;
    if (y < 4) y = 4;
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';

    menu.addEventListener('click', (ev) => {
      const action = ev.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      // Don't close menu for color input
      if (action === 'block-color' || action === 'block-radius') return;
      closeContextMenu();

      switch (action) {
        case 'import-image':
          getFileInput('image/*', (file) => Dashboard.importImage(blockId, file));
          break;
        case 'import-pdf':
          getFileInput('.pdf', (file) => Dashboard.importPDF(blockId, file));
          break;
        case 'edit-text':
          State.updateBlock(blockId, { type: 'text' });
          Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
          setTimeout(() => Dashboard.editTextContent(blockId), 150);
          break;
        case 'rename':
          Dashboard.renameBlock(blockId);
          break;
        case 'toggle':
          Dashboard.toggleBlock(blockId);
          break;
        case 'toggle-md':
          State.updateBlock(blockId, { mdMode: !block.mdMode });
          Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
          UndoRedo.push();
          Toast.show(block.mdMode ? '已切换为 Markdown 模式' : '已切换为纯文本模式');
          break;
        case 'copy-block':
          Dashboard.copyBlock(blockId);
          break;
        case 'lock':
          const wasLocked = block.locked;
          State.updateBlock(blockId, { locked: !wasLocked });
          State.save();
          UndoRedo.push();
          Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
          Toast.show(wasLocked ? '方块已解锁' : '方块已锁定');
          break;
        case 'import-embed':
          const embedUrl = prompt('请输入要嵌入的网页 URL：', 'https://');
          if (embedUrl) {
            State.updateBlock(blockId, { type: 'embed', content: embedUrl });
            Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
            UndoRedo.push();
            Toast.show('网页已嵌入');
          }
          break;
        case 'bring-front':
          Dashboard.bringToFront(blockId);
          Toast.show('已置于顶层');
          break;
        case 'send-back':
          Dashboard.sendToBack(blockId);
          Toast.show('已置于底层');
          break;
        case 'block-font':
          Dashboard.showFontPopup(e, blockId);
          break;
        case 'delete':
          Dashboard.removeBlock(blockId);
          Toast.show('方块已删除');
          break;
        case 'connect':
          closeContextMenu();
          Dashboard._connectFrom = blockId;
          Toast.show('请右键点击目标方块完成连接');
          break;
        case 'add-tag':
          closeContextMenu();
          const tagName = prompt('输入标签名称：');
          if (tagName) {
            if (!block.tags) block.tags = [];
            if (!block.tags.includes(tagName)) block.tags.push(tagName);
            State.save();
            Dashboard.updateTags();
            Toast.show(`已添加标签: ${tagName}`);
          }
          break;
        case 'table-import':
          getFileInput('.csv,.tsv,.txt', (file) => Dashboard.importTable(blockId, file));
          break;
      }
    });

    currentContextMenu = menu;
  },

  // Tab context menu (for dashboard color)
  showTabContextMenu(e, idx) {
    closeContextMenu();
    closeFontPopup();
    const db = State.dashboards[idx];
    if (!db) return;

    const menu = document.createElement('div');
    menu.className = 'context-menu';
    menu.innerHTML = `
      <button class="context-menu-item" data-action="tab-color">
        🎨 展示板颜色 <input type="color" value="${db.color || '#4f6ef7'}" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()"/>
      </button>
      <div class="context-menu-divider"></div>
      <button class="context-menu-item" data-action="tab-rename">✏️ 重命名</button>
      <button class="context-menu-item" data-action="tab-overlap">${db.allowOverlap ? '⊟ 禁止重叠' : '⊞ 允许重叠'}</button>
      ${State.dashboards.length > 1 ? `<div class="context-menu-divider"></div><button class="context-menu-item" data-action="tab-close" style="color:var(--danger)">🗑️ 关闭展示板</button>` : ''}
    `;

    const colorInput = menu.querySelector('input[type="color"]');
    if (colorInput) {
      colorInput.addEventListener('input', (ev) => {
        ev.stopPropagation();
        db.color = colorInput.value;
        State.save();
        Render.tabs();
      });
    }

    document.body.appendChild(menu);
    const rect = menu.getBoundingClientRect();
    let x = e.clientX;
    let y = e.clientY;
    if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 8;
    if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 8;
    if (x < 4) x = 4;
    if (y < 4) y = 4;
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';

    menu.addEventListener('click', (ev) => {
      const action = ev.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      if (action === 'tab-color') return;
      closeContextMenu();
      if (action === 'tab-rename') Dashboard.startRename(idx);
      if (action === 'tab-overlap') Dashboard.toggleOverlap();
      if (action === 'tab-close') Dashboard.removeDashboard(idx);
    });

    currentContextMenu = menu;
  },

  // Font popup
  showFontPopup(e, blockId) {
    closeFontPopup();
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block) return;

    const popup = document.createElement('div');
    popup.className = 'font-popup';
    popup.id = 'fontPopup';

    const fonts = [
      { label: '默认', value: '' },
      { label: '宋体 / Serif', value: "Georgia, 'Times New Roman', '宋体', SimSun, serif" },
      { label: '黑体 / Sans', value: "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '黑体', SimHei, sans-serif" },
      { label: '楷体 / KaiTi', value: "'楷体', KaiTi, 'STKaiti', serif" },
      { label: '仿宋 / FangSong', value: "'仿宋', FangSong, 'STFangsong', serif" },
      { label: '等宽 / Mono', value: "'Cascadia Code', 'Fira Code', 'SF Mono', 'Source Code Pro', Consolas, 'Courier New', monospace" },
    ];

    popup.innerHTML = `
      <h4>字体设置</h4>
      <label style="font-size:12px;color:var(--text-muted)">字体</label>
      <select id="fontFamilySelect">
        ${fonts.map(f => `<option value="${Render._escAttr(f.value)}" ${block.fontFamily === f.value ? 'selected' : ''}>${f.label}</option>`).join('')}
      </select>
      <label style="font-size:12px;color:var(--text-muted)">字号</label>
      <input type="number" id="fontSizeInput" value="${block.fontSize || 14}" min="10" max="48" step="1">
      <div class="font-actions">
        <button class="btn btn-secondary" onclick="closeFontPopup()" style="font-size:12px;padding:4px 10px;">取消</button>
        <button class="btn btn-primary" id="fontApplyBtn" style="font-size:12px;padding:4px 10px;">应用</button>
      </div>
    `;

    document.body.appendChild(popup);

    // Position popup
    const popupRect = popup.getBoundingClientRect();
    let px = e.clientX;
    let py = e.clientY;
    if (px + popupRect.width > window.innerWidth) px = window.innerWidth - popupRect.width - 8;
    if (py + popupRect.height > window.innerHeight) py = window.innerHeight - popupRect.height - 8;
    popup.style.left = px + 'px';
    popup.style.top = py + 'px';

    const applyBtn = popup.querySelector('#fontApplyBtn');
    applyBtn.onclick = () => {
      const family = popup.querySelector('#fontFamilySelect').value;
      const size = parseInt(popup.querySelector('#fontSizeInput').value) || 14;
      State.updateBlock(blockId, { fontFamily: family, fontSize: size });
      State.save();
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      closeFontPopup();
      Toast.show('字体设置已应用');
    };
  },

  // Z-index management
  bringToFront(blockId) {
    const db = State.active;
    if (!db) return;
    const maxZ = Math.max(0, ...db.blocks.map(b => b.z || 0));
    State.updateBlock(blockId, { z: maxZ + 1 });
    UndoRedo.push();
    const el = document.getElementById(blockId);
    if (el) el.style.zIndex = maxZ + 1;
  },

  sendToBack(blockId) {
    const db = State.active;
    if (!db) return;
    const minZ = Math.min(...db.blocks.map(b => b.z || 1));
    const newZ = Math.max(1, minZ - 1);
    State.updateBlock(blockId, { z: newZ });
    UndoRedo.push();
    const el = document.getElementById(blockId);
    if (el) el.style.zIndex = newZ;
  },

  // Block click (for selection)
  handleBlockClick(e, blockId) {
    const block = State.active?.blocks.find(b => b.id === blockId);
    if (!block || block.locked) return;
    // Click on text block body → enter edit mode
    if (block.type === 'text' && e.target.closest('.block-body') && !e.target.closest('.block-header')) {
      Dashboard.editTextContent(blockId);
      return;
    }
    if (e.shiftKey) {
      Selection.toggle(blockId);
    } else {
      Selection.setSingle(blockId);
    }
  },

  // Copy block
  copyBlock(blockId) {
    const db = State.active;
    if (!db) return;
    const src = db.blocks.find(b => b.id === blockId);
    if (!src) return;
    const nextZ = Math.max(0, ...db.blocks.map(b => b.z || 0)) + 1;
    const copy = { ...src, id: uid(), x: src.x + 30, y: src.y + 30, z: nextZ, title: src.title + ' (副本)' };
    db.blocks.push(copy);
    UndoRedo.push();
    State.save();
    Render.blocks();
    Toast.show('方块已复制');
  },

  // Multi-select operations
  alignSelected(dir) {
    const sel = Selection.getBlocks();
    if (sel.length < 2) return;
    UndoRedo.push();
    if (dir === 'left') { const minX = Math.min(...sel.map(b => b.x)); sel.forEach(b => { b.x = minX; }); }
    if (dir === 'right') { const maxR = Math.max(...sel.map(b => b.x + b.w)); sel.forEach(b => { b.x = maxR - b.w; }); }
    if (dir === 'top') { const minY = Math.min(...sel.map(b => b.y)); sel.forEach(b => { b.y = minY; }); }
    if (dir === 'bottom') { const maxB = Math.max(...sel.map(b => b.y + b.h)); sel.forEach(b => { b.y = maxB - b.h; }); }
    State.save();
    Render.blocks();
    Selection.updateQuickBar();
    Toast.show('已对齐');
  },

  lockSelected() {
    const sel = Selection.getBlocks();
    sel.forEach(b => { b.locked = true; });
    State.save();
    UndoRedo.push();
    Render.blocks();
    Selection.clear();
    Toast.show(`${sel.length} 个方块已锁定`);
  },

  unlockSelected() {
    const sel = Selection.getBlocks();
    sel.forEach(b => { b.locked = false; });
    State.save();
    UndoRedo.push();
    Render.blocks();
    Toast.show(`${sel.length} 个方块已解锁`);
  },

  deleteSelected() {
    const sel = Selection.getBlocks();
    if (sel.length === 0) return;
    if (!confirm(`确定删除选中的 ${sel.length} 个方块？`)) return;
    const db = State.active;
    if (!db) return;
    const ids = new Set(sel.map(b => b.id));
    db.blocks = db.blocks.filter(b => !ids.has(b.id));
    UndoRedo.push();
    State.save();
    Selection.clear();
    Render.blocks();
    Render.emptyState();
    Dashboard.updateMinimap();
    Toast.show(`已删除 ${sel.length} 个方块`);
  },

  clearSelection() {
    Selection.clear();
  },

  // Dark mode
  toggleDark() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    document.getElementById('darkToggle').innerHTML = isDark ? '🌙' : '☀️';
    localStorage.setItem('dashboard_theme', isDark ? 'light' : 'dark');
  },

  // Export / Import
  exportDashboard() {
    const db = State.active;
    if (!db) return;
    const data = JSON.stringify(db, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${db.name || 'dashboard'}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.show('展示板已导出');
  },

  importDashboard() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data.blocks || !Array.isArray(data.blocks)) throw new Error('Invalid format');
          const db = data;
          db.id = uid();
          // Ensure legacy fields
          db.blocks.forEach(b => {
            if (b.locked === undefined) b.locked = false;
            if (!b.borderRadius) b.borderRadius = '';
            if (!b.shadow) b.shadow = '';
            if (b.mdMode === undefined) b.mdMode = false;
            if (!b.color) b.color = '';
            if (!b.fontFamily) b.fontFamily = '';
            if (!b.fontSize) b.fontSize = 14;
            if (!b.z) b.z = 1;
          });
          if (db.allowOverlap === undefined) db.allowOverlap = true;
          if (!db.color) db.color = '#4f6ef7';
          State.dashboards.push(db);
          State.activeIdx = State.dashboards.length - 1;
          UndoRedo.push();
          State.save();
          Render.all();
          Toast.show('展示板已导入');
        } catch (err) {
          Toast.show('导入失败：文件格式不正确', 'error');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  // Mini-map
  minimapClick(e) {
    const canvas = document.getElementById('minimapCanvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const db = State.active;
    if (!db) return;

    const maxX = Math.max(800, ...db.blocks.map(b => b.x + b.w));
    const maxY = Math.max(600, ...db.blocks.map(b => b.y + b.h));
    const scaleX = maxX / rect.width;
    const scaleY = maxY / rect.height;

    const clickX = (e.clientX - rect.left) * scaleX;
    const clickY = (e.clientY - rect.top) * scaleY;

    const main = $('#main');
    if (main) {
      main.scrollLeft = clickX - main.clientWidth / 2;
      main.scrollTop = clickY - main.clientHeight / 2;
    }
  },

  updateMinimap() {
    const canvas = document.getElementById('minimapCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const db = State.active;
    if (!db) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }

    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    const maxX = Math.max(800, ...db.blocks.map(b => b.x + b.w));
    const maxY = Math.max(600, ...db.blocks.map(b => b.y + b.h));
    const scaleX = canvas.width / maxX;
    const scaleY = canvas.height / maxY;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(79,110,247,0.3)';
    ctx.strokeStyle = 'rgba(79,110,247,0.5)';
    ctx.lineWidth = 1;

    db.blocks.forEach(b => {
      ctx.fillStyle = b.color || 'rgba(79,110,247,0.3)';
      ctx.strokeStyle = b.color || 'rgba(79,110,247,0.5)';
      ctx.fillRect(b.x * scaleX, b.y * scaleY, b.w * scaleX, b.h * scaleY);
      ctx.strokeRect(b.x * scaleX, b.y * scaleY, b.w * scaleX, b.h * scaleY);
    });
  },

  // ---- New Features (search, grid, presentation, connections, tags, drawing, table) ----

  // Search
  toggleSearch() { document.getElementById('searchBar').classList.toggle('visible'); document.getElementById('searchInput').focus(); },
  doSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const countEl = document.getElementById('searchCount');
    if (!q) { countEl.textContent = ''; $$('.block.highlight').forEach(el => el.classList.remove('highlight')); return; }
    let count = 0;
    const db = State.active;
    if (!db) return;
    db.blocks.forEach(b => {
      const el = document.getElementById(b.id);
      if (!el) return;
      const match = b.title.toLowerCase().includes(q) || (b.content && b.content.toLowerCase().includes(q));
      if (match) { el.classList.add('highlight'); el.style.boxShadow = '0 0 0 3px #f59e0b, 0 4px 6px rgba(0,0,0,0.1)'; count++; }
      else { el.classList.remove('highlight'); el.style.boxShadow = ''; }
    });
    countEl.textContent = count ? `${count} 个匹配` : '无匹配';
    if (count === 1) {
      const el = document.querySelector('.block.highlight');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  },

  // Grid mode
  toggleGrid() {
    const canvas = $('#canvas');
    canvas.classList.toggle('grid-mode');
    State.active.gridOn = canvas.classList.contains('grid-mode');
  },

  // Presentation mode
  _slides: [], _slideIdx: 0,
  startPresentation() {
    const db = State.active;
    if (!db || db.blocks.length === 0) { Toast.show('没有可展示的方块'); return; }
    this._slides = db.blocks.filter(b => !b.collapsed);
    this._slideIdx = 0;
    document.body.classList.add('presenting');
    this._showSlide();
    document.addEventListener('keydown', this._presentKey);
  },
  _showSlide() {
    const slide = this._slides[this._slideIdx];
    if (!slide) return;
    const el = document.getElementById('slideContent');
    const counter = document.getElementById('slideCounter');
    counter.textContent = `${this._slideIdx + 1} / ${this._slides.length}`;
    let content = `<h3>${slide.title}</h3>`;
    if (slide.type === 'image' && slide.content) content += `<img src="${slide.content}" style="max-width:80vw;max-height:50vh;border-radius:8px;">`;
    else if (slide.type === 'text' && slide.content) content += `<p style="white-space:pre-wrap;">${slide.content}</p>`;
    else content += '<p style="color:#888;">（无内容）</p>';
    el.innerHTML = content;
  },
  nextSlide() { this._slideIdx = Math.min(this._slideIdx + 1, this._slides.length - 1); this._showSlide(); },
  prevSlide() { this._slideIdx = Math.max(this._slideIdx - 1, 0); this._showSlide(); },
  stopPresentation() {
    document.body.classList.remove('presenting');
    document.removeEventListener('keydown', this._presentKey);
  },
  _presentKey(e) {
    if (e.key === 'Escape') Dashboard.stopPresentation();
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); Dashboard.nextSlide(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); Dashboard.prevSlide(); }
  },

  // Connection lines
  addConnection(fromId, toId) {
    const db = State.active;
    if (!db) return;
    if (!db.connections) db.connections = [];
    if (db.connections.find(c => (c.from === fromId && c.to === toId) || (c.from === toId && c.to === fromId))) {
      Toast.show('这两个方块已经连接');
      return;
    }
    db.connections.push({ from: fromId, to: toId });
    State.save();
    this.updateConnections();
    Toast.show('连接已创建');
  },
  removeConnection(fromId, toId) {
    const db = State.active;
    if (!db || !db.connections) return;
    db.connections = db.connections.filter(c => !((c.from === fromId && c.to === toId) || (c.from === toId && c.to === fromId)));
    State.save();
    this.updateConnections();
  },
  updateConnections() {
    setTimeout(() => {
      const svg = document.getElementById('connectionsSvg');
      if (!svg) return;
      const db = State.active;
      svg.innerHTML = `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4f6ef7"/></marker></defs>`;
      if (!db || !db.connections) return;
      db.connections.forEach(c => {
        const fromEl = document.getElementById(c.from), toEl = document.getElementById(c.to);
        if (!fromEl || !toEl) return;
        const canvasR = svg.parentElement.getBoundingClientRect();
        const fromR = fromEl.getBoundingClientRect(), toR = toEl.getBoundingClientRect();
        const x1 = fromR.left + fromR.width/2 - canvasR.left, y1 = fromR.top + fromR.height/2 - canvasR.top;
        const x2 = toR.left + toR.width/2 - canvasR.left, y2 = toR.top + toR.height/2 - canvasR.top;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        svg.appendChild(line);
      });
    }, 50);
  },

  // Groups
  createGroup(name) {
    const db = State.active;
    if (!db) return;
    if (!db.groups) db.groups = [];
    const sel = Selection.getBlocks();
    const blockIds = sel.length > 0 ? sel.map(b => b.id) : [];
    const gx = blockIds.length > 0 ? Math.min(...sel.map(b => b.x)) - 16 : 100;
    const gy = blockIds.length > 0 ? Math.min(...sel.map(b => b.y)) - 30 : 100;
    const gw = blockIds.length > 0 ? Math.max(...sel.map(b => b.x + b.w)) - gx + 16 : 200;
    const gh = blockIds.length > 0 ? Math.max(...sel.map(b => b.y + b.h)) - gy + 16 : 150;
    db.groups.push({
      id: uid(), name: name || `分组 ${db.groups.length + 1}`,
      blockIds, x: gx, y: gy, w: Math.max(gw, 200), h: Math.max(gh, 120), color: db.color || '#4f6ef7'
    });
    UndoRedo.push();
    State.save();
    this.renderGroups();
    Toast.show(`分组「${name || '未命名'}」已创建`);
  },
  removeGroup(groupId) {
    const db = State.active;
    if (!db || !db.groups) return;
    db.groups = db.groups.filter(g => g.id !== groupId);
    UndoRedo.push();
    State.save();
    this.renderGroups();
    Toast.show('分组已删除');
  },
  renameGroup(groupId) {
    const db = State.active;
    const g = db?.groups?.find(x => x.id === groupId);
    if (!g) return;
    const newName = prompt('输入分组名称：', g.name);
    if (newName) { g.name = newName; State.save(); this.renderGroups(); }
  },
  renderGroups() {
    // Remove existing group boxes
    $$('.group-box').forEach(el => el.remove());
    $$('.group-label').forEach(el => el.remove());
    const db = State.active;
    if (!db || !db.groups || db.groups.length === 0) return;
    const canvas = $('#canvas');
    db.groups.forEach(g => {
      const box = document.createElement('div');
      box.className = 'group-box';
      box.style.cssText = `left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;border-color:${g.color};background:${Render._hexToRgba(g.color, 0.08)};`;
      const label = document.createElement('div');
      label.className = 'group-label';
      label.style.cssText = `left:${g.x + 16}px;top:${g.y - 14}px;background:${g.color};`;
      label.textContent = g.name;
      label.ondblclick = () => this.renameGroup(g.id);
      label.oncontextmenu = (e) => { e.preventDefault();
        const m = document.createElement('div'); m.className = 'context-menu'; m.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;`;
        m.innerHTML = `<button class="context-menu-item" data-a="gr">✏️ 重命名</button><button class="context-menu-item" data-a="gd" style="color:var(--danger)">🗑️ 删除</button>`;
        document.body.appendChild(m);
        m.onclick = (ev) => { const a = ev.target.dataset.a; m.remove(); if (a === 'gr') this.renameGroup(g.id); if (a === 'gd') this.removeGroup(g.id); };
        setTimeout(() => document.addEventListener('click', () => m.remove(), { once: true }), 0);
      };
      canvas.appendChild(box);
      canvas.appendChild(label);
    });
  },


  // Tags
  updateTags() {
    const db = State.active;
    if (!db) return;
    const tagBar = $('#tagBar');
    if (!db.tags) db.tags = [];
    const allTags = new Set();
    db.blocks.forEach(b => { if (b.tags) b.tags.forEach(t => allTags.add(t)); });
    tagBar.innerHTML = [...allTags].map(t =>
      `<span class="tag${db.activeTag === t ? ' active' : ''}" onclick="Dashboard.filterByTag('${t.replace(/'/g, "\\'")}')">${t}</span>`
    ).join('');
    if (allTags.size > 0) {
      tagBar.innerHTML += `<span class="tag" onclick="Dashboard.filterByTag('')">全部</span>`;
    }
    tagBar.innerHTML += `<input class="tag-input" id="newTagInput" placeholder="+ 新标签" onkeydown="if(event.key==='Enter')Dashboard.addTag()">`;
  },
  addTag() {
    const input = document.getElementById('newTagInput');
    if (!input || !input.value.trim()) return;
    const db = State.active;
    if (!db) return;
    if (!db.tags) db.tags = [];
    const tag = input.value.trim();
    if (!db.tags.includes(tag)) db.tags.push(tag);
    db.activeTag = tag;
    input.value = '';
    State.save();
    this.updateTags();
    this.filterByTag(tag);
  },
  filterByTag(tag) {
    const db = State.active;
    if (!db) return;
    db.activeTag = tag || '';
    this.updateTags();
    db.blocks.forEach(b => {
      const el = document.getElementById(b.id);
      if (!el) return;
      if (!tag || (b.tags && b.tags.includes(tag))) el.style.display = '';
      else el.style.display = 'none';
    });
    this.updateMinimap();
  },

  // Drawing tools
  _drawing: false, _drawColor: '#000', _drawSize: 4,
  toggleDrawing() {
    this._drawing = !this._drawing;
    document.getElementById('drawingTools').classList.toggle('visible', this._drawing);
    if (!this._drawing) return;
    if (!this._drawCanvas) {
      this._drawCanvas = document.createElement('canvas');
      this._drawCanvas.className = 'draw-canvas';
      this._drawCanvas.width = 2000; this._drawCanvas.height = 2000;
      $('#canvas').appendChild(this._drawCanvas);
      this._drawCtx = this._drawCanvas.getContext('2d');
      this._drawCanvas.addEventListener('mousedown', (e) => this._drawStart(e));
      this._drawCanvas.addEventListener('mousemove', (e) => this._drawMove(e));
      this._drawCanvas.addEventListener('mouseup', () => this._drawEnd());
      this._drawCanvas.addEventListener('mouseleave', () => this._drawEnd());
    }
    this._drawCanvas.style.display = this._drawing ? 'block' : 'none';
  },
  _drawStart(e) {
    if (!this._drawing) return;
    this._drawIsDown = true;
    const r = this._drawCanvas.getBoundingClientRect();
    this._drawCtx.beginPath();
    this._drawCtx.moveTo(e.clientX - r.left, e.clientY - r.top);
  },
  _drawMove(e) {
    if (!this._drawIsDown) return;
    const r = this._drawCanvas.getBoundingClientRect();
    this._drawCtx.lineTo(e.clientX - r.left, e.clientY - r.top);
    this._drawCtx.strokeStyle = this._drawColor;
    this._drawCtx.lineWidth = this._drawSize;
    this._drawCtx.lineCap = 'round';
    this._drawCtx.stroke();
  },
  _drawEnd() { this._drawIsDown = false; },
  setDrawColor(c) { this._drawColor = c; },
  setDrawSize(s) {
    this._drawSize = s;
    $$('.drawing-tools button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  },
  clearDrawing() {
    if (this._drawCtx) this._drawCtx.clearRect(0, 0, 2000, 2000);
  },

  // Data table
  importTable(blockId, file) {
    const reader = new FileReader();
    reader.onload = () => {
      const lines = reader.result.split('\n').filter(l => l.trim());
      if (lines.length < 2) { Toast.show('CSV 格式不正确', 'error'); return; }
      const headers = lines[0].split(',').map(h => h.trim());
      const rows = lines.slice(1).map(l => l.split(',').map(c => c.trim()));
      const tableHTML = `<table class="block-table"><thead><tr>${headers.map(h => `<th onclick="Dashboard.sortTable(event,'${h}')">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      State.updateBlock(blockId, { type: 'table', content: JSON.stringify({ headers, rows }), title: '数据表' });
      Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
      Toast.show('数据表已导入');
    };
    reader.readAsText(file);
  },
  sortTable(e, col) {
    const block = State.active?.blocks.find(b => b.id === e.target.closest('.block')?.id);
    if (!block) return;
    const data = JSON.parse(block.content);
    const idx = data.headers.indexOf(col);
    data.rows.sort((a, b) => (a[idx] || '').localeCompare(b[idx] || ''));
    block.content = JSON.stringify(data);
    Render.singleBlock(block);
  },

  // Drop handler for file drag & drop
  handleDrop(e, blockId) {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (!files || files.length === 0) return;

    const file = files[0];

    if (file.type.startsWith('image/')) {
      Dashboard.importImage(blockId, file);
    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      Dashboard.importPDF(blockId, file);
    } else {
      // Try as text
      const reader = new FileReader();
      reader.onload = () => {
        State.updateBlock(blockId, { type: 'text', content: reader.result });
        Render.singleBlock(State.active.blocks.find(b => b.id === blockId));
        Toast.show('文本文件已导入');
      };
      reader.readAsText(file);
    }
  },

  // Global canvas drop - create new block from dropped file
  handleCanvasDrop(e) {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (!files || files.length === 0) return;

    const file = files[0];
    const db = State.active;
    if (!db) return;

    // Create new block at drop position
    const canvas = $('#canvas');
    const canvasRect = canvas.getBoundingClientRect();
    const x = e.clientX - canvasRect.left - 150;
    const y = e.clientY - canvasRect.top - 20;

    const nextZ = Math.max(0, ...db.blocks.map(b => b.z || 0)) + 1;
    const block = {
      id: uid(),
      type: 'text',
      title: file.name,
      x: Math.max(0, x),
      y: Math.max(0, y),
      w: 400,
      h: 320,
      collapsed: false,
      content: '',
      color: '',
      fontFamily: '',
      fontSize: 14,
      z: nextZ,
      locked: false,
      borderRadius: '',
      shadow: '',
      mdMode: false
    };
    db.blocks.push(block);
    UndoRedo.push();
    State.save();
    Render.blocks();
    Render.emptyState();

    // Import file into new block
    if (file.type.startsWith('image/')) {
      Dashboard.importImage(block.id, file);
    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      Dashboard.importPDF(block.id, file);
    } else {
      const reader = new FileReader();
      reader.onload = () => {
        State.updateBlock(block.id, { type: 'text', content: reader.result });
        Render.singleBlock(State.active.blocks.find(b => b.id === block.id));
        Toast.show('文本文件已导入');
      };
      reader.readAsText(file);
    }
    Toast.show(`已导入: ${file.name}`);
  }
};

// ---- Keyboard Shortcuts ----
document.addEventListener('keydown', (e) => {
  // Ctrl+Z: undo
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (UndoRedo.undo()) Toast.show('已撤销');
  }
  // Ctrl+Y or Ctrl+Shift+Z: redo
  if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'Z')) {
    e.preventDefault();
    if (UndoRedo.redo()) Toast.show('已重做');
  }
  // Ctrl+N: new block
  if (e.ctrlKey && e.key === 'n' && !e.shiftKey) {
    e.preventDefault();
    Dashboard.addBlock('text');
  }
  // Ctrl+Shift+N: new dashboard
  if (e.ctrlKey && e.shiftKey && e.key === 'N') {
    e.preventDefault();
    Dashboard.addDashboard();
  }
  // Ctrl+D: toggle dark mode
  if (e.ctrlKey && e.key === 'd' && !e.shiftKey) {
    e.preventDefault();
    Dashboard.toggleDark();
  }
  // Ctrl+F: search
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    Dashboard.toggleSearch();
  }
  // Arrow keys: nudge selected block(s)
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && Selection.count() > 0) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    const blocks = Selection.getBlocks();
    blocks.forEach(b => {
      if (b.locked) return;
      if (e.key === 'ArrowLeft') b.x -= step;
      if (e.key === 'ArrowRight') b.x += step;
      if (e.key === 'ArrowUp') b.y -= step;
      if (e.key === 'ArrowDown') b.y += step;
    });
    UndoRedo.push();
    State.save();
    Render.blocks();
    Selection.updateQuickBar();
  }
  // Escape: close popups and clear selection
  if (e.key === 'Escape') {
    closeContextMenu();
    closeFontPopup();
    if (Selection.count() > 0) Selection.clear();
  }
  // Delete: remove selected blocks
  if (e.key === 'Delete' && Selection.count() > 0) {
    e.preventDefault();
    Dashboard.deleteSelected();
  }
});

// Close context menu on outside click
document.addEventListener('click', (e) => {
  if (currentContextMenu && !currentContextMenu.contains(e.target)) {
    closeContextMenu();
  }
});

// ---- Touch Support ----
document.addEventListener('touchstart', (e) => {
  const header = e.target.closest('.block-header');
  if (header && header.closest('.block')) {
    e.preventDefault(); // Prevent mouse event synthesis
    const blockEl = header.closest('.block');
    const blockId = blockEl.id;
    const touch = e.touches[0];
    DragDrop.start({ button: 0, clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} }, blockId);
    const touchMove = (ev) => {
      ev.preventDefault();
      const t = ev.touches[0];
      DragDrop._move({ clientX: t.clientX, clientY: t.clientY });
    };
    const touchEnd = (ev) => {
      document.removeEventListener('touchmove', touchMove);
      document.removeEventListener('touchend', touchEnd);
      const t = ev.changedTouches[0];
      DragDrop._end({ clientX: t.clientX, clientY: t.clientY });
    };
    document.addEventListener('touchmove', touchMove, { passive: false });
    document.addEventListener('touchend', touchEnd);
  }

  const handle = e.target.closest('.resize-handle');
  if (handle) {
    e.preventDefault(); // Prevent mouse event synthesis
    const blockEl = handle.closest('.block');
    const blockId = blockEl.id;
    const hClass = [...handle.classList].find(c => c.length <= 2 && /^[nsew]+$/.test(c));
    const touch = e.touches[0];
    Resize.start({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {}, stopPropagation: () => {} }, blockId, hClass);
    const touchMove = (ev) => {
      ev.preventDefault();
      const t = ev.touches[0];
      Resize._move({ clientX: t.clientX, clientY: t.clientY });
    };
    const touchEnd = () => {
      document.removeEventListener('touchmove', touchMove);
      document.removeEventListener('touchend', touchEnd);
      Resize._end({});
    };
    document.addEventListener('touchmove', touchMove, { passive: false });
    document.addEventListener('touchend', touchEnd);
  }
}, { passive: false });

// ---- Init ----
(async function bootstrap() {
  await State.init();
  // Restore theme
  const savedTheme = localStorage.getItem('dashboard_theme');
  if (savedTheme === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    document.getElementById('darkToggle').innerHTML = '☀️';
  }
  // Push initial state for undo
  UndoRedo.push();
  Render.all();
  // Log storage info
  const usage = await Storage.getUsage();
  console.log(`📦 存储: ${usage}`);
})();
Render.all();
